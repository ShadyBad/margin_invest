name: CI

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main]

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - run: uv sync

      - run: uv run ruff check engine/ api/

      - run: uv run ruff format --check engine/ api/

      - name: Minimize uv cache
        run: uv cache prune --ci

  engine-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - run: uv sync --all-packages

      - run: uv run pytest engine/ -v --tb=short --cov=margin_engine --cov-report=term-missing --cov-fail-under=95

      - name: Minimize uv cache
        run: uv cache prune --ci

  api-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - run: uv sync --all-packages

      - run: uv run pytest api/ -v --tb=short --cov=margin_api --cov-report=term-missing --cov-fail-under=70

      - name: Minimize uv cache
        run: uv cache prune --ci

  web-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: cd web && npm ci

      - run: cd web && npx vitest run --coverage --coverage.thresholds.lines=65

      - name: Verify production build
        run: cd web && npx next build
