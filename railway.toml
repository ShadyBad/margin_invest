[build]
builder = "DOCKERFILE"
dockerfilePath = "api/Dockerfile"

[deploy]
startCommand = "python -c 'from margin_api.app import create_app; app=create_app(); print(f\"App ready: {app.title}\")' && uvicorn margin_api.app:create_app --factory --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
