<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="580" viewBox="0 0 1200 580"
     role="img" aria-labelledby="pipe-title pipe-desc">
  <title id="pipe-title">The Margin Invest scoring pipeline</title>
  <desc id="pipe-desc">Seven stages. A universe of 3,056 tickers passes through 7 elimination filters, four sector-neutral scoring pillars, and a 13F smart-money overlay. Survivors then pass through 10-K risk factor diffing, Kelly criterion position sizing, and a stage-approve-publish step that requires human approval.</desc>

  <rect width="1200" height="580" rx="20" fill="#0D0F12"/>
  <rect x="0.75" y="0.75" width="1198.5" height="578.5" rx="19.25" fill="none" stroke="#252830" stroke-width="1.5"/>

  <g id="connectors" stroke="#252830" stroke-width="1.5">
    <line x1="600" y1="96" x2="600" y2="114"/>
    <line x1="600" y1="170" x2="600" y2="188"/>
    <line x1="600" y1="244" x2="600" y2="262"/>
    <line x1="600" y1="318" x2="600" y2="336"/>
    <line x1="600" y1="392" x2="600" y2="410"/>
    <line x1="600" y1="466" x2="600" y2="484"/>
  </g>

  <g id="stage-1">
    <text x="92" y="73" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#1A7A5A">3,056</text>
    <rect x="110" y="40" width="980" height="56" rx="12" fill="#151820" stroke="#252830" stroke-width="1.5"/>
    <text x="130" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#E8E8E6">Universe</text>
    <text x="130" y="83" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B6B68">US equities, ex-financials and REITs — engine/universe.yaml</text>
  </g>

  <g id="stage-2">
    <text x="192" y="147" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#1A7A5A">7</text>
    <rect x="210" y="114" width="780" height="56" rx="12" fill="#151820" stroke="#252830" stroke-width="1.5"/>
    <text x="230" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#E8E8E6">Elimination filters</text>
    <text x="230" y="157" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B6B68">liquidity · altman_z · beneish_m · current_ratio · fcf_distress · interest_coverage · mediocrity_gate</text>
  </g>

  <g id="stage-3">
    <text x="292" y="221" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#1A7A5A">4</text>
    <rect x="310" y="188" width="580" height="56" rx="12" fill="#151820" stroke="#252830" stroke-width="1.5"/>
    <text x="330" y="212" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#E8E8E6">Percentile scoring</text>
    <text x="330" y="231" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B6B68">quality · value · momentum · growth — ranked within GICS sector</text>
  </g>

  <g id="stage-4">
    <rect x="410" y="262" width="380" height="56" rx="12" fill="#151820" stroke="#252830" stroke-width="1.5"/>
    <text x="430" y="286" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#E8E8E6">13F smart-money overlay</text>
    <text x="430" y="305" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B6B68">new positions, crowded trades</text>
  </g>

  <g id="stage-5">
    <rect x="410" y="336" width="380" height="56" rx="12" fill="#151820" stroke="#252830" stroke-width="1.5"/>
    <text x="430" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#E8E8E6">Risk factor diffing</text>
    <text x="430" y="379" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B6B68">semantic diff of consecutive 10-K Item 1A</text>
  </g>

  <g id="stage-6">
    <rect x="410" y="410" width="380" height="56" rx="12" fill="#151820" stroke="#252830" stroke-width="1.5"/>
    <text x="430" y="434" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#E8E8E6">Kelly criterion sizing</text>
    <text x="430" y="453" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B6B68">quarter-Kelly, capped by max position</text>
  </g>

  <g id="stage-7">
    <rect x="410" y="484" width="380" height="56" rx="12" fill="#151820" stroke="#1A7A5A" stroke-width="1.5"/>
    <text x="430" y="508" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" fill="#E8E8E6">Stage → approve → publish</text>
    <text x="430" y="527" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B6B68">human approval required</text>
  </g>
</svg>
